<script>
  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -5,
    maxZoom: 2,
    zoomSnap: 0.25
  });

  var width = 5944;
  var height = 8075;

  var bounds = [[0, 0], [height, width]];

  var image = L.imageOverlay('map.jpg', bounds).addTo(map);

  map.fitBounds(bounds);   // ✅ THIS WAS MISSING
  map.setZoom(-2);

  map.on('click', function(e) {
    L.circle(e.latlng, {
      radius: 300,
      color: 'red',
      fillColor: 'red',
      fillOpacity: 0.4
    }).addTo(map)
      .bindPopup("Gang Zone")
      .openPopup();
  });
</script>
