<!DOCTYPE html>
<html>
<head>
  <title>CID Map System</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      font-family: 'Special Elite', monospace;
    }

    #map {
      height: 100%;
      width: 100%;
      display: none;
    }

    .leaflet-container {
      background: #000 !important;
    }

    /* LOGIN SCREEN */
    #login {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #333;
      text-align: center;
    }

    #login input {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 8px;
      margin-top: 10px;
    }

    #login button {
      margin-top: 10px;
      padding: 8px;
      background: #222;
      color: white;
      border: 1px solid #444;
      cursor: pointer;
    }

    /* TOOLBAR */
    #toolbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: #111;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #333;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    #toolbar input,
    #toolbar select {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 5px;
      font-family: 'Special Elite', monospace;
    }

    .leaflet-tooltip {
      background: rgba(0,0,0,0.9);
      color: white;
      border: 1px solid #444;
      font-family: 'Special Elite', monospace;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h3>CID ACCESS</h3>
  <input type="password" id="password" placeholder="Enter password">
  <br>
  <button onclick="checkPassword()">Enter</button>
</div>

<!-- TOOLBAR -->
<div id="toolbar" style="display:none;">
  <select id="mode">
    <option value="circle">Zone</option>
    <option value="bench">Workbench</option>
    <option value="g">Gregory</option>
  </select>

  <input type="color" id="colorPicker" value="#ff0000">

  <input type="range" id="radius" min="25" max="250" step="10" value="100">

  <input type="text" id="label" placeholder="Notes...">

  <button id="deleteMode">Delete</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API = "https://res-cid-api.cara-monroe-docs.workers.dev";

// 🔐 PASSWORD
function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === "CaraCara") {
    document.getElementById("login").style.display = "none";
    document.getElementById("map").style.display = "block";
    document.getElementById("toolbar").style.display = "flex";
    map.invalidateSize();
  } else {
    alert("Incorrect password");
  }
}

// MAP
var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -5,
  maxZoom: 2
});

var bounds = [[0,0],[8075,5944]];
L.imageOverlay('map.jpg', bounds).addTo(map);

map.fitBounds(bounds);
map.setZoom(-2);
map.setMaxBounds(bounds);

// ICONS
var benchIcon = L.divIcon({
  html: "<span style='color:#ff9900;font-size:20px;text-shadow:0 0 2px black;'>⚒</span>",
  className: "",
  iconSize: [20,20]
});

var gIcon = L.divIcon({
  html: "<span style='color:lime;font-size:20px;text-shadow:0 0 2px black;'>G</span>",
  className: "",
  iconSize: [20,20]
});

let currentZones = {};
let deleteMode = false;

document.getElementById("deleteMode").onclick = function() {
  deleteMode = !deleteMode;
  this.classList.toggle("active");
};

// SYNC
async function syncZones() {
  const res = await fetch(API);
  const zones = await res.json();

  const newIds = new Set();

  zones.forEach(z => {
    newIds.add(z.id);

    if (!currentZones[z.id]) {

      let layer;

      if (z.color === "bench") {
        layer = L.marker([z.lat, z.lng], { icon: benchIcon });
      } 
      else if (z.color === "g") {
        layer = L.marker([z.lat, z.lng], { icon: gIcon });
      } 
      else {
        layer = L.circle([z.lat, z.lng], {
          radius: z.radius,
          color: z.color,
          fillColor: z.color,
          fillOpacity: 0.4
        });
      }

      layer.addTo(map);

      layer.bindTooltip(z.label || "Marker");

      layer.on('click', async function() {
        if (deleteMode) {
          await fetch(`${API}?id=${z.id}`, { method: "DELETE" });
        }
      });

      currentZones[z.id] = layer;
    }
  });

  for (let id in currentZones) {
    if (!newIds.has(Number(id))) {
      map.removeLayer(currentZones[id]);
      delete currentZones[id];
    }
  }
}

// SAVE
async function saveData(data) {
  await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
}

// CLICK
map.on('click', async function(e) {

  if (deleteMode) return;

  var mode = document.getElementById('mode').value;
  var color = document.getElementById('colorPicker').value;
  var radius = parseInt(document.getElementById('radius').value);
  var label = document.getElementById('label').value;

  if (mode === "circle") {
    await saveData({lat:e.latlng.lat,lng:e.latlng.lng,radius,color,label});
  }

  if (mode === "bench") {
    await saveData({lat:e.latlng.lat,lng:e.latlng.lng,radius:0,color:"bench",label});
  }

  if (mode === "g") {
    await saveData({lat:e.latlng.lat,lng:e.latlng.lng,radius:0,color:"g",label});
  }
});

setInterval(syncZones, 2000);
syncZones();
</script>

</body>
</html>
