<!DOCTYPE html>
<html>
<head>
  <title>GTA CID Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- CID TYPEWRITER FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Special Elite', monospace;
      background: #000;
    }

    #map {
      height: 100%;
      width: 100%;
      background: #111;
    }

    #controls {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;
      background: #111;
      color: white;
      padding: 12px;
      border-radius: 8px;
      width: 220px;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    #controls input,
    #controls select {
      width: 100%;
      margin-bottom: 6px;
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 5px;
      font-family: 'Special Elite', monospace;
    }

    #controls label {
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div id="controls">
  <label>Mode:</label>
  <select id="mode">
    <option value="circle">Zone</option>
    <option value="bench">Workbench</option>
    <option value="g">Gregory</option>
  </select>

  <label>Colour:</label>
  <select id="gang">
    <option value="red">Red</option>
    <option value="green">Green</option>
    <option value="yellow">Yellow</option>
    <option value="blue">Blue</option>
    <option value="purple">Purple</option>
  </select>

  <label>Radius:</label>
  <input type="range" id="radius" min="25" max="250" step="10" value="100">

  <label>Notes:</label>
  <input type="text" id="label" placeholder="Enter intel...">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const API = "https://res-cid-api.cara-monroe-docs.workers.dev";

  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -5,
    maxZoom: 2
  });

  var width = 5944;
  var height = 8075;
  var bounds = [[0, 0], [height, width]];

  L.imageOverlay('map.jpg', bounds).addTo(map);

  map.fitBounds(bounds);
  map.setZoom(-2);
  map.setMaxBounds(bounds);

  // 🔧 WORKBENCH ICON
  var benchIcon = L.divIcon({
    html: "<span style='color:#ff9900;font-size:32px;text-shadow:-2px -2px 0 black,2px -2px 0 black,-2px 2px 0 black,2px 2px 0 black;'>⚒</span>",
    className: "",
    iconSize: [32, 32]
  });

  // 🟢 GREGORY ICON
  var gIcon = L.divIcon({
    html: "<span style='color:lime;font-weight:bold;font-size:32px;text-shadow:-2px -2px 0 black,2px -2px 0 black,-2px 2px 0 black,2px 2px 0 black;'>G</span>",
    className: "",
    iconSize: [32, 32]
  });

  let currentZones = {};

  // 🔄 SYNC DATA
  async function syncZones() {
    const res = await fetch(API);
    const zones = await res.json();

    const newIds = new Set();

    zones.forEach(z => {
      newIds.add(z.id);

      if (!currentZones[z.id]) {

        let layer;

        if (z.color === "bench") {
          layer = L.marker([z.lat, z.lng], { icon: benchIcon });
        } 
        else if (z.color === "g") {
          layer = L.marker([z.lat, z.lng], { icon: gIcon });
        } 
        else {
          layer = L.circle([z.lat, z.lng], {
            radius: z.radius,
            color: z.color,
            fillColor: z.color,
            fillOpacity: 0.4
          });
        }

        layer.addTo(map);
        layer.bindPopup(z.label || "Marker");

        // DELETE
        layer.on('contextmenu', async function() {
          await fetch(`${API}?id=${z.id}`, { method: "DELETE" });
        });

        currentZones[z.id] = layer;
      }
    });

    // REMOVE deleted zones
    for (let id in currentZones) {
      if (!newIds.has(Number(id))) {
        map.removeLayer(currentZones[id]);
        delete currentZones[id];
      }
    }
  }

  // 💾 SAVE
  async function saveData(data) {
    await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });
  }

  // 🖱️ CLICK
  map.on('click', async function(e) {
    var mode = document.getElementById('mode').value;
    var color = document.getElementById('gang').value;
    var radius = parseInt(document.getElementById('radius').value);
    var label = document.getElementById('label').value;

    if (mode === "circle") {
      await saveData({
        lat: e.latlng.lat,
        lng: e.latlng.lng,
        radius,
        color,
        label
      });
    }

    if (mode === "bench") {
      await saveData({
        lat: e.latlng.lat,
        lng: e.latlng.lng,
        radius: 0,
        color: "bench",
        label
      });
    }

    if (mode === "g") {
      await saveData({
        lat: e.latlng.lat,
        lng: e.latlng.lng,
        radius: 0,
        color: "g",
        label
      });
    }
  });

  // 🔁 AUTO SYNC
  setInterval(syncZones, 2000);

  // INITIAL LOAD
  syncZones();
</script>

</body>
</html>
</body>
</html>
