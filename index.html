<!DOCTYPE html>
<html>
<head>
  <title>GTA CID Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #map {
      height: 100%;
      width: 100%;
      background: #111;
    }

    #controls {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;
      background: #111;
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-family: Arial;
      width: 200px;
    }

    #controls input,
    #controls select {
      width: 100%;
      margin-bottom: 6px;
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 4px;
    }
  </style>
</head>

<body>

<div id="controls">
  <label>Colour:</label>
  <select id="gang">
    <option value="red">Red</option>
    <option value="green">Green</option>
    <option value="yellow">Yellow</option>
    <option value="blue">Blue</option>
    <option value="purple">Purple</option>
  </select>

  <label>Radius:</label>
  <input type="range" id="radius" min="25" max="250" step="10" value="100">

  <label>Notes:</label>
  <input type="text" id="label" placeholder="Enter info">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const API = "https://res-cid-api.cara-monroe-docs.workers.dev";

  var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -5,
    maxZoom: 2
  });

  var width = 5944;
  var height = 8075;
  var bounds = [[0, 0], [height, width]];

  L.imageOverlay('map.jpg', bounds).addTo(map);

  map.fitBounds(bounds);
  map.setZoom(-2);
  map.setMaxBounds(bounds);

  // LOAD ZONES
  async function loadZones() {
    const res = await fetch(API);
    const zones = await res.json();

    zones.forEach(z => {
      const circle = L.circle([z.lat, z.lng], {
        radius: z.radius,
        color: z.color,
        fillColor: z.color,
        fillOpacity: 0.4
      }).addTo(map);

      circle.bindPopup(z.label || "Zone");

      // DELETE
      circle.on('contextmenu', async function() {
        await fetch(`${API}?id=${z.id}`, { method: "DELETE" });
        location.reload();
      });
    });
  }

  // SAVE
  async function saveZone(lat, lng, radius, color, label) {
    await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ lat, lng, radius, color, label })
    });
  }

  // CLICK
  map.on('click', async function(e) {
    var color = document.getElementById('gang').value;
    var radius = parseInt(document.getElementById('radius').value);
    var label = document.getElementById('label').value;

    await saveZone(e.latlng.lat, e.latlng.lng, radius, color, label);

    location.reload();
  });

  loadZones();
</script>

</body>
</html>
