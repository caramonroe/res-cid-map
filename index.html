<!DOCTYPE html>
<html>
<head>
  <title>CID Map System</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Special Elite', monospace;
      background: #000;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    /* CENTERED TOOLBAR */
    #toolbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;

      background: #111;
      color: white;

      display: flex;
      flex-wrap: wrap;
      gap: 6px;

      padding: 10px 12px;
      border-radius: 10px;

      border: 1px solid #333;
      box-shadow: 0 0 15px rgba(0,0,0,0.8);

      align-items: center;
    }

    #toolbar select,
    #toolbar input {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 5px;
      font-family: 'Special Elite', monospace;
      font-size: 14px;
    }

    #toolbar button {
      background: #222;
      color: white;
      border: 1px solid #444;
      padding: 5px 8px;
      cursor: pointer;
    }

    #toolbar button.active {
      background: red;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      #toolbar {
        top: auto;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: column;
        width: 90%;
      }
    }
  </style>
</head>

<body>

<div id="toolbar">
  <select id="mode">
    <option value="circle">Zone</option>
    <option value="bench">Workbench</option>
    <option value="g">Gregory</option>
  </select>

  <select id="gang">
    <option value="red">Red</option>
    <option value="green">Green</option>
    <option value="yellow">Yellow</option>
    <option value="blue">Blue</option>
    <option value="purple">Purple</option>
  </select>

  <input type="range" id="radius" min="25" max="250" step="10" value="100">

  <input type="text" id="label" placeholder="Notes...">

  <button id="deleteMode">Delete</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API = "https://res-cid-api.cara-monroe-docs.workers.dev";

var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -5,
  maxZoom: 2
});

var bounds = [[0,0],[8075,5944]];
L.imageOverlay('map.jpg', bounds).addTo(map);

map.fitBounds(bounds);
map.setZoom(-2);
map.setMaxBounds(bounds);

// PREVENT LONG PRESS MENU
document.addEventListener('contextmenu', e => e.preventDefault());

// ICONS
var benchIcon = L.divIcon({
  html: "<span style='color:#ff9900;font-size:20px;text-shadow:-1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black,1px 1px 0 black;'>⚒</span>",
  className: "",
  iconSize: [20,20]
});

var gIcon = L.divIcon({
  html: "<span style='color:lime;font-weight:bold;font-size:20px;text-shadow:-1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black,1px 1px 0 black;'>G</span>",
  className: "",
  iconSize: [20,20]
});

let currentZones = {};
let deleteMode = false;

// TOGGLE DELETE MODE
document.getElementById("deleteMode").onclick = function() {
  deleteMode = !deleteMode;
  this.classList.toggle("active");
};

// SYNC DATA
async function syncZones() {
  const res = await fetch(API);
  const zones = await res.json();

  const newIds = new Set();

  zones.forEach(z => {
    newIds.add(z.id);

    if (!currentZones[z.id]) {

      let layer;

      if (z.color === "bench") {
        layer = L.marker([z.lat, z.lng], { icon: benchIcon });
      } 
      else if (z.color === "g") {
        layer = L.marker([z.lat, z.lng], { icon: gIcon });
      } 
      else {
        layer = L.circle([z.lat, z.lng], {
          radius: z.radius,
          color: z.color,
          fillColor: z.color,
          fillOpacity: 0.4
        });
      }

      layer.addTo(map);
      layer.bindPopup(z.label || "Marker");

      layer.on('click', async function() {
        if (deleteMode) {
          await fetch(`${API}?id=${z.id}`, { method: "DELETE" });
        }
      });

      currentZones[z.id] = layer;
    }
  });

  for (let id in currentZones) {
    if (!newIds.has(Number(id))) {
      map.removeLayer(currentZones[id]);
      delete currentZones[id];
    }
  }
}

// SAVE DATA
async function saveData(data) {
  await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
}

// MAP CLICK
map.on('click', async function(e) {

  if (deleteMode) return;

  var mode = document.getElementById('mode').value;
  var color = document.getElementById('gang').value;
  var radius = parseInt(document.getElementById('radius').value);
  var label = document.getElementById('label').value;

  if (mode === "circle") {
    await saveData({lat:e.latlng.lat,lng:e.latlng.lng,radius,color,label});
  }

  if (mode === "bench") {
    await saveData({lat:e.latlng.lat,lng:e.latlng.lng,radius:0,color:"bench",label});
  }

  if (mode === "g") {
    await saveData({lat:e.latlng.lat,lng:e.latlng.lng,radius:0,color:"g",label});
  }
});

// REALTIME LOOP
setInterval(syncZones, 2000);
syncZones();

// MOBILE FIX
window.addEventListener('resize', () => map.invalidateSize());
</script>

</body>
</html>
